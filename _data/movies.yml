- title: "Sentimental Value"
  year: 2025
  rating: "4/5"
  cover: "https://image.tmdb.org/t/p/w500/pz9NCWxxOk3o0W3v1Zkhawrwb4i.jpg"
  year_group: "2026"
  review: >
    For a family drama, the movie is exceptionally restrained. What could have
    been a dialogue is often a single word, if not a glance or a pause. A lesser
    movie dealing with similar themes would have built towards a cathartic
    crescendo; here, the climax is scalpel-like, burrowing deep and surgically
    removing the rot that has rooted itself in the characters, their
    relationships, and their home (quite literally).

    There is the element of synecdoche here with the film within the film, the
    climax within a climax. Skarsgard's character also rewrites the past with
    his mother, and it ripples into the present with his daughter; here you get
    the sense that time and experience is malleable, always capable of being
    tinkered with.

    All the actors are phenomenal. Stellan Skarsgard's character is a set of
    walking contradictions: paternal yet distant, placid yet explosive,
    charismatic but withdrawn - still water with a roiling seabed. Elle Fanning
    can really act; tongue-in-cheek to have her play the movie star. Renate
    Reinsve is transcendental as the daughter; there's a quiet violence to her
    performance and you truly believe she's her father's daughter. Inge Lilleas
    is also a great foil as her sister.

- title: "28 Years Later - The Bone Temple"
  year: 2026
  rating: "3.5/5"
  cover: "https://image.tmdb.org/t/p/w500/kK1BGkG3KAvWB0WMV1DfOx9yTMZ.jpg"
  year_group: "2026"
  review: >
    The Bone Temple is excellent; the plot here is skeleton-thin, but more
    impactful for the same. The tonal shifts and sub-plots that put me off the
    prequel are the strengths of the movie here, largely owing to the star turns
    by the two leads - Jack O'Connell and Ralph Fiennes. I knew JoC only via
    reputation but he's undeniable here. RF puts in an all-time performance.

    For a zombie movie, this is also surprisingly feel-good. It's tough to find a fresh take on a zombie movie in 2026 but TBT manages.

- title: "Rental Family"
  year: 2025
  rating: "3/5"
  cover: "https://image.tmdb.org/t/p/w500/nRrwqApUDFL8gLGyJFIdDkmoule.jpg"
  year_group: "2026"
  review: >
    What should've been saccharine and cloying is instead wholesome, sweet with
    a tinge of melancholy. There's an element of sleight of hand here as you
    contemplate absence, loss, and yearning only to realise what you're watching
    is instead an ode to companionship, presence, and love.

    There are some neat parallels and rug-pulls. The fake funeral at the
    beginning, and the one at the end. The main proprietor's rental family.

    The scene at the end where Brendan Fraser crosses the barrier and sees
    himself in a mirror swells the heart. Fraser has this sadness in
    his eyes that can only come from having lived it but he plays his role here
    with a lot of grace and humour, elevating a role that could've otherwise
    been by the numbers.

- title: "Marty Supreme"
  year: 2026
  rating: "3.5/5"
  cover: "https://image.tmdb.org/t/p/w500/lYWEXbQgRTR4ZQleSXAgRbxAjvq.jpg"
  year_group: "2026"
  review: >
    Didn't grab me like UG but the same Safdie hijinks are present here as well.
    Music and casting were the highlights for me.

    Unlike the other Safdie protagonists, Marty isn't a fundamentally bad
    person. He's similarly conniving and narcissistic but you truly believe he's
    doing it for a higher purpose. By the time the end credits roll, he's had
    his pyrrhic victory, and is ready to go beyond himself.

