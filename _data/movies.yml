- title: "The Secret Agent"
  year: 2025
  rating: "4/5"
  cover: "https://image.tmdb.org/t/p/w500/iLE2YOmeboeTDC7GlOp1dzh1VFo.jpg"
  year_group: "2026"
  review: >
    The Secret Agent is disjointed, chaotic, and fleetingly explained - and is all the better for it.
    In its telling of a corrupt state, even a corrupt time (the military dictatorship in Brazil extended for over 20 years), it presents a series of contrasts: you're intermittently lulled with the humdrum reality of a rotten administration, before a frenzy hits and you're reminded that the stakes have always been life-and-death.
    You also oscillate similarly between numbness as the loss of life is initially presented as a statistic, only for the true weight of lost memory and misplaced generations to make itself felt later.
    TSA does not do much by way of exposition and I felt lost for some portion of the run time. This begins to make sense when you consider that the director's last movie - *Pictures of Ghosts* - is also set in the Brazilian city of Recife (also where the majority of TSA plays out) and is a melancholy retrospective of his childhood through the lens of the cinema halls he once visited. In this context, you realise that the movie here is a lament by a son of Brazil, confusing and abrupt only because it's but a page, one torn out of the larger story of a lost country and its emotionally displaced people.

- title: "Hamnet"
  year: 2025
  rating: "4/5"
  cover: "https://image.tmdb.org/t/p/w500/vbeyOZm2bvBXcbgPD3v6o94epPX.jpg"
  year_group: "2026"
  review: >
    Much like the play itself, Hamnet establishes a mood by invoking the supernatural and the arcane.
    The woods are sinister, there are secret compacts with plants and roots, the river has a mind of its own, and a pet
    is also a guide into the nether realms.
    The movie must necessarily centre around the Bard and his creation, but it's his betrothed Agnes who serves as the primary vehicle for the movie's meditations on life and loss.
    Agnes is introduced to us as the daughter of a witch. She holds Will's hand and reads entire landscapes.
    She even rushes to the woods to give birth to their first child.
    When she is stopped from birthing in the woods later in the movie, the river comes to her - it's clear that she has a commune with the supernatural. Yet, it is Agnes who serves as the everyman - her torment and pain is capable of being understood, Will's tribulations are of a different breed, removed from our mortal plane of reason.
    You wonder where the movie is leading for most of its runtime until it comes together in a staggering denouement; 'to be or not to be' has served as a clarion call for existential dread, but here it serves as the cathartic key freeing Agnes, and maybe, even William.

- title: "Perfect Days"
  year: 2023
  rating: "4.5/5"
  cover: "https://image.tmdb.org/t/p/w500/tvUHVSTJV9ITON3oyHaWp7oaAc8.jpg"
  year_group: "2026"
  review: >
    Perfect Days could be viewed as a pronouncement on a life well-led, simply.
    It lulls you into a false sense of security, then deconstructs its central
    premise only to bring it back with manifold strength.

    The first hour settles you into Hirayama's routine as he begins each day looking up at the sky
    with a smile that's not expectant, proceeds to lose himself in his menial labour, savours his 
    lunch next to a 'friend-tree',and enjoys a drink and bite at a local eatery to mark the end of another day. 
    Hours stack into days into weeks and you see how he's carefully constructed his world -
    one world amongst the "many worlds" he theorises to exist. You see a man who
    seems to have escaped the trappings of daily life; depending on your
    disposition, you view him as evolved or escapist.

    You often catch Hirayama take a pause and watch the play of light through
    the trees (the motif of Komorebi is ever present) or that of reflections and
    shadows that mirror the world around him in secret ways to which only he is
    privy. You also see the construction of his perfect day - moments captured
    via an analog camera, music played via cassettes, paperbacks read under a
    lamp - he moves in lockstep with his routine, an extension of himself.

    This routine is then juxtaposed against a peek into his past (as his niece
    shows up, bringing him to face with his sister and the painful memories of a
    parent present but lost), and his routine is also challenged. Hirayama is
    man fully immersed in the present - "now is now, next time is next time" -
    an element of suspense is introduced as you see his anxiety in being pulled
    out of the moment and you wonder, how will he cope?

    You can interpret the closing montage differently, but my take is that this
    crisis only reinforces his deep love for life, in that it forces him to
    confront where he's 'given up' (the escapist notion) and also embrace all
    the aspects of his life that lead up to him waking up and exiting his house
    with a smile each day.

    PS: Notes on the cinematography and the OST/books:

    The aspect ratio is a boxy 4:3 which seems portrait-like and offers a
    closed and intimate perspective on Hirayama's day - his mindful focus on
    the moment extends into what the viewer sees on the screen.

    Hirayama reads Faulkner, Natsume Soseki, and Patricia Highsmith. I suspect
    these are deliberate choices - the bookkeeper references Highsmith knowing
    more about anxiety than anyone else when Hirayama purchases a book by her.

    The OST is a perfect mirror to Hirayama's state of mind through the movie.
    The movie begins slowly (matching the pace of an early morning) and the van
    speeds up as House of the Rising Sun starts playing. The other songs are
    similarly evocative with turns by Patti Smith (Aya's rebelliousness),
    Velvet Underground (melancholy love), Otis Redding (wistfulness).

