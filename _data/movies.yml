- title: "Furiosa: A Mad Max Saga"
  year: 2024
  rating: "4/5"
  cover: "https://image.tmdb.org/t/p/w500/iADOJ8Zymht2JPMoy3R7xceZprc.jpg"
  year_group: "2026"
  review: >
    Had low expectations going into this as Fury Road had not been to my liking
    but the more deliberate pacing here along with the early investment made in
    introducing us to the dieselpunk world of Mad Max ensured that I was
    captivated throughout. I know the set pieces and live action is half the
    allure of the Mad Max series, but this is the movie where it clicked for
    me - the 'heist' runs with the imperator's truck are spectacular.

- title: "Meiyazhagan"
  year: 2024
  rating: "4.75/5"
  cover: "https://image.tmdb.org/t/p/w500/ngDEH7YqVaMCAD4LpNxRl6ScJnw.jpg"
  year_group: "2026"
  review: >
    Stunning; in less capable hands, this would've devolved into a feel-good
    story on a discontented man reconnecting with his roots, but the question
    of the protagonist's identity adds an element of intrigue that keeps the
    viewer guessing, and by the end you realise that the mystery itself is
    trivial relative to the movie's message of unqualified love and affection
    for all and sundry. Life affirming in the best way.

