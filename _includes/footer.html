<footer class="site-footer" role="contentinfo">
  <div class="wrapper footer-wrapper">
    <div class="footer-colophon">
      <span class="footer-year">© {{ site.time | date: "%Y" }}</span>
      <span class="footer-tagline">Digital Terrarium</span>
      <span class="footer-icons">
        <a class="footer-link" href="mailto:9ranjal@gmail.com" aria-label="Email">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </a>
        {%- if site.linkedin_username -%}
          <a class="footer-link" href="https://www.linkedin.com/in/{{ site.linkedin_username | escape }}/" target="_blank" rel="noopener" aria-label="LinkedIn">
            <svg aria-hidden="true">
              <use xlink:href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use>
            </svg>
          </a>
        {%- endif -%}
      </span>
    </div>
  </div>
</footer>
